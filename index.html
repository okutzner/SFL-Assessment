<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preload" href="curtin.png" as="image">
<title>Short Form Learning - Project Readiness Check</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#eef2ff 0%,#e0e7ff 50%,#c7d2fe 100%);min-height:100vh;padding:24px 16px}
.wrap{max-width:800px;margin:0 auto}
.header{text-align:center;margin-bottom:32px}
.header img{height:60px;width:auto;display:block;margin:0 auto 20px}
h1{font-size:28px;font-weight:800;color:#1e1b4b;margin-bottom:4px}
.subtitle{font-size:22px;color:#6366f1;font-weight:600;margin-bottom:16px}
/* Info panel */
.info-toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;padding:8px 16px;border-radius:999px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);font-size:13px;font-weight:600;color:#6366f1;border:none;font-family:inherit}
.info-toggle svg{transition:transform .25s ease}
.info-toggle.open svg.chevron{transform:rotate(180deg)}
.info-body{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .3s ease;opacity:0;text-align:left;max-width:640px;margin:0 auto}
.info-body.open{max-height:500px;opacity:1}
.info-body-inner{background:#fff;border-radius:12px;padding:16px 24px;margin-top:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.info-body-inner p{font-size:14px;color:#4b5563;line-height:1.6;margin-bottom:10px}
.info-body-inner p:last-child{margin-bottom:0;font-style:italic}
/* Progress */
.progress-card{background:#fff;border-radius:16px;padding:16px 24px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,.04)}
.progress-labels{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;font-weight:600;color:#6366f1}
.progress-bar{height:6px;background:#e0e7ff;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#4f46e5);border-radius:999px;transition:width .4s ease}
/* Nav pills */
.nav-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.pill{padding:6px 14px;border-radius:999px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;color:#6b7280;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .2s}
.pill.active{background:#4f46e5;color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.3)}
/* Form card */
.form-card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.06);overflow:hidden}
.section-header{display:flex;align-items:center;gap:12px;padding:20px 28px;border-bottom:1px solid #e5e7eb}
.section-icon{width:40px;height:40px;border-radius:10px;background:#eef2ff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-header h2{font-size:18px;font-weight:700;color:#1e1b4b}
.section-body{padding:28px}
.form-footer{display:flex;justify-content:space-between;padding:16px 28px;border-top:1px solid #f3f4f6;gap:12px}
/* Inputs */
label.field-label{display:block;font-size:14px;font-weight:600;color:#374151;margin-bottom:6px}
.req{color:#dc2626}
input[type=text],input[type=date],textarea{width:100%;padding:10px 14px;border-radius:10px;font-size:15px;outline:none;box-sizing:border-box;font-family:inherit;border:1px solid #d1d5db}
input[type=text]:focus,input[type=date]:focus,textarea:focus{border-color:#a5b4fc}
input.err,textarea.err{border:2px solid #dc2626}
textarea{min-height:80px;resize:vertical}
.field-group{margin-bottom:20px}
/* Radio / Checkbox */
.opt{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:all .2s;user-select:none}
.opt:hover{background:#f9fafb}
.opt.checked{background:#eef2ff;border-color:#a5b4fc}
.opt.disabled{opacity:.4;cursor:not-allowed}
.radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid #d1d5db;background:#fff;flex-shrink:0;transition:all .2s}
.opt.checked .radio-dot{border:6px solid #4f46e5}
.check-box{width:20px;height:20px;border-radius:4px;border:2px solid #d1d5db;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.opt.checked .check-box{border:none;background:#4f46e5}
.opt-label{font-size:15px;color:#374151}
.opt.checked .opt-label{color:#312e81;font-weight:600}
/* Validation msg */
.val-msg{display:flex;align-items:center;gap:8px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px;font-weight:500;color:#dc2626}
/* Buttons */
.btn-back{padding:12px 24px;border-radius:10px;border:1px solid #d1d5db;background:#fff;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;color:#374151}
.btn-back:disabled{color:#d1d5db;cursor:not-allowed}
.btn-next{padding:12px 28px;border-radius:10px;border:none;background:#4f46e5;color:#fff;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.btn-calc{padding:12px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(79,70,229,.4)}
/* Tooltip */
.tip-wrap{position:relative;display:inline-flex;align-items:center;margin-left:6px}
.tip-icon{cursor:pointer;display:inline-flex;align-items:center}
.tip-box{display:none;position:fixed;z-index:200;background:#1e1b4b;color:#fff;font-size:12px;padding:10px 14px;border-radius:8px;width:260px;max-width:calc(100vw - 32px);line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,.25);white-space:normal;font-weight:400}
.tip-wrap.show .tip-box{display:block}
/* Shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease}
/* Results */
.result-wrap{max-width:720px;margin:0 auto}
.result-card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.08);overflow:hidden}
.result-hero{padding:48px 32px;text-align:center}
.result-hero h1{font-size:28px;font-weight:800;color:#1e1b4b;margin-bottom:8px}
.result-score{font-size:64px;font-weight:800;line-height:1.1}
.result-cat{font-size:24px;font-weight:700;margin:8px 0}
.result-timeline{display:inline-flex;align-items:center;gap:8px;background:#fff;padding:8px 20px;border-radius:999px;font-size:16px;color:#4b5563;font-weight:500}
.result-hero-icon{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:#fff;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.tabs{display:flex;border-bottom:1px solid #e5e7eb}
.tab-btn{flex:1;padding:12px 16px;border:none;border-bottom:3px solid transparent;background:transparent;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;color:#6b7280;transition:all .2s}
.tab-btn.active{color:#4f46e5;border-bottom-color:#4f46e5}
.tab-panel{padding:32px;display:none}
.tab-panel.active{display:block}
/* Score bars */
.score-bar-row{margin-bottom:16px}
.score-bar-labels{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px}
.score-bar-track{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:999px;transition:width .8s ease}
/* Summary */
.summary-score-box{border-radius:12px;padding:20px;margin-bottom:20px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.summary-grid-item{background:#fff;border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#6b7280;font-weight:500}
.summary-rows{background:#f8fafc;border-radius:12px;padding:4px 20px 8px;border:1px solid #e2e8f0}
.summary-row{padding:12px 0;border-bottom:1px solid #f1f5f9}
.summary-row:last-child{border-bottom:none}
.summary-row-label{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.summary-row-val{font-size:15px;font-weight:500;color:#1e1b4b}
.summary-row-val.muted{color:#9ca3af}
/* Result actions */
.result-actions{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:12px}
.btn-reset{flex:1;padding:14px 0;background:#4f46e5;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.btn-copy{padding:14px 20px;background:#f8fafc;color:#374151;border:1px solid #d1d5db;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;transition:all .3s;white-space:nowrap}
.btn-copy.copied{background:#059669;color:#fff;border:none}
.info-banner{display:flex;align-items:center;gap:8px;margin-top:16px;background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:12px 16px;font-size:13px;color:#3730a3;line-height:1.5}
.info-banner svg{flex-shrink:0}
/* Project info box */
.project-box{background:#f8fafc;border-radius:12px;padding:20px;margin-top:24px;border:1px solid #e2e8f0}
.project-box h3{font-size:16px;font-weight:700;color:#1e1b4b;margin-bottom:8px}
.project-box p{font-size:14px;color:#64748b;margin-top:4px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  sec: 1,
  showResults: false,
  score: null,
  tab: 'score',
  copied: false,
  errors: {},
  fd: {
    projectName:'', faculty:'', launchDate:'',
    existingContent:[], contentStage:'', deliveredBefore:'',
    deliveryDetails:'', developmentLift:'', productionElements:[],
    approvals:[], marketingDeadline:'', marketingDate:''
  }
};

// ── Static data ───────────────────────────────────────────────────────────────
const SECTIONS = [
  {id:1, title:'Project Overview', icon:'file'},
  {id:2, title:'Curriculum Design', icon:'wrench'},
  {id:3, title:'Content Inventory', icon:'layers'},
  {id:4, title:'Delivery History', icon:'truck'},
  {id:5, title:'Learning Resource Development', icon:'cog'},
  {id:6, title:'Delivery Requirements', icon:'wrench'},
  {id:7, title:'Approvals & Governance', icon:'shield'},
];

const LM = {
  contentStage:{concept:'Concept only',outline:'Unit or Course outline exists for reuse or adaptation',developed:'Newly developed curriculum design',credentialed:'Previously approved/accredited'},
  deliveredBefore:{no:'No – new offering',f2f:'Yes – face-to-face',hybrid:'Yes – hybrid or blended delivery',sync:'Yes – online synchronous (live sessions via Zoom, etc.)',async:'Yes – online asynchronous (self-paced, no live component)'},
  developmentLift:{minimal:'Minimal – reformatting/digitisation/light review and edit',moderate:'Moderate – repurpose for online/microcredential',significant:'Significant – substantial new authoring, revise content, instruction, edit/create media, add activities',scratch:'Full build – no existing content'},
  approvals:{faculty:'Faculty/School/Business Manager',academic:'Academic Board / credit-bearing',legal:'Legal / IP',industry:'Industry sign-off',research:'Research ethics',marketing:'Marketing sign-off',none:'None identified'},
  marketingDeadline:{yes:'Yes',no:'No',tbd:'TBD'},
  productionElements:{lms:'LMS build only',video:'Video production',animation:'Animation/motion graphics',interactive:'Interactive learning objects',sme:'External subject matter interviews',credential:'Credential/badge integration',comms:'Lecturer/Student communication channels',assessment:'Assessment submission points, student peer review, groupwork, scheduled live online presentations, closed captions'},
  existingContent:{slides:'Presentation slides ready for live delivery, slide deck(s) ready to transfer',recorded:'iLecture / recorded presentations / demonstration videos ready for embedding',written:'Text based materials (manuals, PDFs, notes)',assessments:'Formative assessment tasks',summative:'Summative assessment tasks',rubric:'Marking rubric complete with criteria, performance levels, and descriptors',media:'Media resources including graphics, diagrams, case study videos or interactive objects',marketing:'Marketing copy',nothing:'Nothing exists yet'}
};

const SEC2 = [['concept','Concept only'],['outline','Unit or Course outline exists for reuse or adaptation'],['developed','Newly designed curriculum'],['credentialed','Previously approved/accredited']];
const SEC3 = [['slides','Presentation slides ready for live delivery, slide deck(s) ready to transfer'],['recorded','iLecture / recorded presentations / demonstration videos ready for embedding'],['written','Text based materials (manuals, PDFs, notes)'],['assessments','Formative (Non-grade-bearing quizzes, student reflection, peer-learning, feedback for learning) assessment tasks'],['summative','Summative (Graded assignment, submission, report) assessment tasks'],['rubric','Marking rubric complete with criteria, performance levels, and descriptors'],['media','Media resources including graphics, diagrams, case study videos or interactive objects'],['marketing','Marketing copy']];
const SEC4 = [['no','No – new offering'],['f2f','Yes – face-to-face'],['hybrid','Yes – hybrid or blended delivery'],['sync','Yes – online synchronous (live sessions via Zoom, etc.)'],['async','Yes – online asynchronous (self-paced, no live component)']];
const SEC5 = [['scratch','Full build – no existing content'],['significant','Significant – substantial new authoring, revise content, instruction, edit/create media, add activities'],['moderate','Moderate – repurpose for online/microcredential'],['minimal','Minimal – reformatting/digitisation/light review and edit']];
const SEC6 = [['lms','LMS build (text, quizzes, downloads, content structure, alternate accessibility formats, instructions)'],['video','Video production (studio or on location) – Presentation/Demonstration/closed captions'],['animation','Animation/motion graphics'],['interactive','Interactive learning objects'],['sme','External subject matter interviews'],['credential','Credential/badge integration'],['comms','Lecturer/Student communication channels'],['assessment','Assessment submission points, student peer review, groupwork, scheduled live online presentations, closed captions']];
const SEC7_APP = [['faculty','Faculty/School/Business Manager'],['academic','Academic Board / credit-bearing'],['legal','Legal / IP'],['industry','Industry sign-off'],['research','Research ethics'],['marketing','Marketing sign-off'],['none','None identified']];

const gl = (map, val) => LM[map]?.[val] || '';
const gls = (map, arr) => arr.length ? arr.map(v => gl(map, v)).filter(Boolean).join(', ') : null;

// ── SVG icons ─────────────────────────────────────────────────────────────────
const ICONS = {
  file: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  wrench: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
  layers: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
  truck: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
  cog: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  shield: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  chevronR: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  chevronL: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  check: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  checkSm: `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  copy: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
  reset: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>`,
  clock: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  checkCircle: (col) => `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
  barChart: (col) => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>`,
  list: (col) => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
  info: (col='#4f46e5') => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
  alert: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
};

// ── Scoring ───────────────────────────────────────────────────────────────────
function calcScore() {
  const fd = state.fd;
  const content = fd.existingContent.length ? fd.existingContent : ['nothing'];
  const cm = {credentialed:4,developed:0.5,outline:1,concept:0}[fd.contentStage]||0;
  const ca = ['slides','assessments','summative','recorded','written','rubric','media'].filter(x=>content.includes(x)).length;
  const dl = {minimal:4,moderate:2,significant:1,scratch:0}[fd.developmentLift]||0;
  const pc = Math.max(0,4-['video','animation','sme','interactive','comms','assessment'].filter(x=>fd.productionElements.includes(x)).length);
  const dh = fd.deliveredBefore && fd.deliveredBefore!=='no' ? 1 : 0;
  const total = cm+ca+dl+pc+dh;
  const [category,timeline,color,bg] = total>=16?['Fast Track','4-6 weeks','#059669','#ecfdf5']:total>=12?['Accelerated','6-10 weeks','#2563eb','#eff6ff']:total>=7?['Standard Build','10-14 weeks','#d97706','#fffbeb']:['Full Development','14-20+ weeks','#dc2626','#fef2f2'];
  return {total,cm,ca,dl,pc,dh,category,timeline,color,bg};
}

// ── Validation ────────────────────────────────────────────────────────────────
function validate(s) {
  const e = {};
  const fd = state.fd;
  if(s===1 && !fd.projectName.trim()) e.projectName='Project name is required';
  if(s===2 && !fd.contentStage) e.contentStage='Please select a content development stage';
  if(s===4 && !fd.deliveredBefore) e.deliveredBefore='Please select a delivery history option';
  if(s===5 && !fd.developmentLift) e.developmentLift='Please select a development lift option';
  return e;
}

// ── Copy text ─────────────────────────────────────────────────────────────────
function buildCopyText() {
  const {fd, score} = state;
  if(!score) return '';
  const content = fd.existingContent.length ? fd.existingContent : ['nothing'];
  return [
    'SHORT FORM LEARNING - PROJECT READINESS CHECK','=============================================','',
    `Overall Score: ${score.total}/20`,`Category: ${score.category}`,`Estimated Timeline: ${score.timeline}`,'',
    'SCORE BREAKDOWN',
    `  Curriculum Design:     ${score.cm}/4`,`  Content Inventory:     ${score.ca}/7`,`  Delivery Experience:   ${score.dh}/1`,`  Resource Development:  ${score.dl}/4`,`  Production Requirement:${score.pc}/4`,'',
    'RESPONSE SUMMARY','---------------------------------------------',
    `Project Name: ${fd.projectName||'—'}`,`Faculty / Industry Partner: ${fd.faculty||'—'}`,`Target Launch Date: ${fd.launchDate||'—'}`,
    `Content Stage: ${gl('contentStage',fd.contentStage)||'—'}`,`Delivered Before: ${gl('deliveredBefore',fd.deliveredBefore)||'—'}`,
    ...(fd.deliveredBefore&&fd.deliveredBefore!=='no'?[`Delivery Details: ${fd.deliveryDetails||'—'}`]:[]),
    `Existing Content: ${gls('existingContent',content)||'—'}`,`Development Lift: ${gl('developmentLift',fd.developmentLift)||'—'}`,
    `Production Elements: ${gls('productionElements',fd.productionElements)||'—'}`,`Approvals Required: ${gls('approvals',fd.approvals)||'—'}`,
    `Marketing Deadline Committed: ${gl('marketingDeadline',fd.marketingDeadline)||'—'}`,
    ...(fd.marketingDate?[`Marketing Date: ${fd.marketingDate}`]:[]),
  ].join('\n');
}

// ── HTML builders ─────────────────────────────────────────────────────────────
function radioOpt(val, label, checked, name) {
  return `<div class="opt${checked?' checked':''}" data-radio="${name}" data-val="${val}" role="radio" aria-checked="${checked}">
    <div class="radio-dot"></div>
    <span class="opt-label">${label}</span>
  </div>`;
}

function checkOpt(val, label, checked, name, disabled) {
  return `<div class="opt${checked?' checked':''}${disabled?' disabled':''}" data-check="${name}" data-val="${val}" role="checkbox" aria-checked="${checked}">
    <div class="check-box">${checked?ICONS.checkSm:''}</div>
    <span class="opt-label">${label}</span>
  </div>`;
}

function valMsg(msg) {
  return `<div class="val-msg">${ICONS.alert}<span>${msg}</span></div>`;
}

function summaryRow(label, val, muted) {
  return `<div class="summary-row"><div class="summary-row-label">${label}</div><div class="summary-row-val${muted?' muted':''}">${val}</div></div>`;
}

function scoreBar(label, value, max, color) {
  const pct = (value/max)*100;
  return `<div class="score-bar-row">
    <div class="score-bar-labels"><span style="font-weight:500;color:#374151">${label}</span><span style="font-weight:700;color:${color}">${value}/${max}</span></div>
    <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

// ── Section content ───────────────────────────────────────────────────────────
function renderSection(s) {
  const fd = state.fd;
  const e = state.errors;
  switch(s) {
    case 1: return `
      <div class="field-group">
        <label class="field-label">Project Name <span class="req">*</span></label>
        <input type="text" id="projectName" value="${fd.projectName}" placeholder="Enter project name" class="${e.projectName?'err':''}">
        ${e.projectName?valMsg(e.projectName):''}
      </div>
      <div class="field-group">
        <label class="field-label">Faculty / Industry Partner</label>
        <input type="text" id="faculty" value="${fd.faculty}" placeholder="Enter faculty or partner name">
      </div>
      <div class="field-group" style="margin-bottom:0">
        <label class="field-label">Target Launch Date (if known)</label>
        <input type="date" id="launchDate" value="${fd.launchDate}">
      </div>`;
    case 2: return `
      <label class="field-label">How developed is the current curriculum? <span class="req">*</span></label>
      ${SEC2.map(([v,l]) => {
        if(v==='developed') l = `Newly designed curriculum <span class="tip-wrap" id="devtip"><span class="tip-icon">${ICONS.info('#6366f1')}</span><span class="tip-box">Including: learning outcomes, assessment tasks, lesson plans, activities, communication strategy, feedback loops, content and resources such as case studies, textbooks and industry engagement.</span></span>`;
        return radioOpt(v, l, fd.contentStage===v, 'contentStage');
      }).join('')}
      ${e.contentStage?valMsg(e.contentStage):''}`;
    case 3: return `
      <label class="field-label">What content has already been created for this course?</label>
      ${SEC3.map(([v,l]) => checkOpt(v, l, fd.existingContent.includes(v), 'existingContent', fd.existingContent.includes('nothing'))).join('')}
      ${checkOpt('nothing','Nothing exists yet', fd.existingContent.includes('nothing'), 'existingContent', false)}`;
    case 4: return `
      <label class="field-label">Has the learning material been delivered before? <span class="req">*</span></label>
      ${SEC4.map(([v,l]) => radioOpt(v, l, fd.deliveredBefore===v, 'deliveredBefore')).join('')}
      ${e.deliveredBefore?valMsg(e.deliveredBefore):''}
      ${fd.deliveredBefore&&fd.deliveredBefore!=='no'?`
        <div class="field-group" style="margin-top:16px;margin-bottom:0">
          <label class="field-label">Duration & audience details</label>
          <textarea id="deliveryDetails" placeholder="E.g., 12-week course, 150 students">${fd.deliveryDetails}</textarea>
        </div>`:''}`;
    case 5: return `
      <label class="field-label">How much resource development would be required? <span class="req">*</span></label>
      ${SEC5.map(([v,l]) => radioOpt(v, l, fd.developmentLift===v, 'developmentLift')).join('')}
      ${e.developmentLift?valMsg(e.developmentLift):''}`;
    case 6: return `
      <label class="field-label">What elements would further support course delivery?</label>
      ${SEC6.map(([v,l]) => checkOpt(v, l, fd.productionElements.includes(v), 'productionElements', false)).join('')}`;
    case 7: return `
      <label class="field-label">Approvals required?</label>
      ${SEC7_APP.map(([v,l]) => checkOpt(v, l, fd.approvals.includes(v), 'approvals', false)).join('')}
      <div style="margin-top:20px">
        <label class="field-label">Marketing launch date committed?</label>
        ${[['yes','Yes'],['no','No']].map(([v,l]) => radioOpt(v, l, fd.marketingDeadline===v, 'marketingDeadline')).join('')}
        ${fd.marketingDeadline==='yes'?`
          <div class="field-group" style="margin-top:12px;margin-bottom:0">
            <label class="field-label">Launch date <span class="req">*</span></label>
            <input type="date" id="marketingDate" value="${fd.marketingDate}">
          </div>`:''}
        ${fd.marketingDeadline==='tbd'?`
          <div class="field-group" style="margin-top:12px;margin-bottom:0">
            <label class="field-label">Estimated launch date (optional)</label>
            <input type="date" id="marketingDate" value="${fd.marketingDate}">
          </div>`:''}
      </div>`;
  }
}

// ── Render results ────────────────────────────────────────────────────────────
function renderResults() {
  const {score, tab, copied, fd} = state;
  const content = fd.existingContent.length ? fd.existingContent : ['nothing'];
  const isScore = tab==='score';
  const scoreCol = tab==='score'?'#4f46e5':'#6b7280';
  const listCol = tab==='summary'?'#4f46e5':'#6b7280';

  const scorePanelHTML = `
    ${scoreBar('Curriculum Design', score.cm, 4, '#8b5cf6')}
    ${scoreBar('Content Inventory', score.ca, 7, '#3b82f6')}
    ${scoreBar('Delivery Experience', score.dh, 1, '#6366f1')}
    ${scoreBar('Resource Development', score.dl, 4, '#10b981')}
    ${scoreBar('Production Requirement', score.pc, 4, '#f59e0b')}
    <div class="project-box">
      <h3>${fd.projectName||'—'}</h3>
      <p>Faculty/Partner: ${fd.faculty||'Not specified'}</p>
      ${fd.launchDate?`<p>Target Launch: ${fd.launchDate}</p>`:''}
    </div>`;

  const summaryPanelHTML = `
    <div class="summary-score-box" style="background:${score.bg};border:1px solid ${score.color}22">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <div style="font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em">Overall Score</div>
          <div style="font-size:32px;font-weight:800;color:${score.color};line-height:1.2">${score.total}/16</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:700;color:${score.color}">${score.category}</div>
          <div style="font-size:14px;color:#6b7280">${score.timeline}</div>
        </div>
      </div>
      <div class="summary-grid">
        ${[{l:'Curriculum Design',v:score.cm,c:'#8b5cf6'},{l:'Content Inventory',v:score.ca,c:'#3b82f6'},{l:'Delivery Experience',v:score.dh,c:'#6366f1'},{l:'Resource Development',v:score.dl,c:'#10b981'},{l:'Production Requirement',v:score.pc,c:'#f59e0b'}].map(s=>`<div class="summary-grid-item">${s.l}<span style="font-size:14px;font-weight:700;color:${s.c}">${s.v}</span></div>`).join('')}
      </div>
    </div>
    <div class="summary-rows">
      ${summaryRow('Project Name', fd.projectName||'—', !fd.projectName)}
      ${summaryRow('Faculty / Industry Partner', fd.faculty||'—', !fd.faculty)}
      ${summaryRow('Target Launch Date', fd.launchDate||'—', !fd.launchDate)}
      ${summaryRow('Content Stage', gl('contentStage',fd.contentStage)||'—', !fd.contentStage)}
      ${summaryRow('Delivered Before', gl('deliveredBefore',fd.deliveredBefore)||'—', !fd.deliveredBefore)}
      ${fd.deliveredBefore&&fd.deliveredBefore!=='no'?summaryRow('Delivery Details', fd.deliveryDetails||'—', !fd.deliveryDetails):''}
      ${summaryRow('Existing Content', gls('existingContent',content)||'—', content.includes('nothing'))}
      ${summaryRow('Development Lift', gl('developmentLift',fd.developmentLift)||'—', !fd.developmentLift)}
      ${summaryRow('Production Elements', gls('productionElements',fd.productionElements)||'—', !fd.productionElements.length)}
      ${summaryRow('Approvals Required', gls('approvals',fd.approvals)||'—', !fd.approvals.length)}
      ${summaryRow('Marketing Deadline', gl('marketingDeadline',fd.marketingDeadline)||'—', !fd.marketingDeadline)}
      ${fd.marketingDate?summaryRow('Marketing Date', fd.marketingDate, false):''}
    </div>`;

  return `
    <div class="result-wrap">
      <div class="result-card">
        <div class="result-hero" style="background:${score.bg};border-bottom:3px solid ${score.color}">
          <div class="result-hero-icon">${ICONS.checkCircle(score.color)}</div>
          <h1>Short Form Learning - Project Readiness Check</h1>
          <div class="result-score" style="color:${score.color}">${score.total}/20</div>
          <div class="result-cat" style="color:${score.color}">${score.category}</div>
          <div class="result-timeline">${ICONS.clock} Estimated: ${score.timeline}</div>
        </div>
        <div class="tabs">
          <button class="tab-btn${isScore?' active':''}" id="tabScore">${ICONS.barChart(scoreCol)} Score Breakdown</button>
          <button class="tab-btn${!isScore?' active':''}" id="tabSummary">${ICONS.list(listCol)} Summary</button>
        </div>
        <div id="panelScore" class="tab-panel${isScore?' active':''}">${scorePanelHTML}</div>
        <div id="panelSummary" class="tab-panel${!isScore?' active':''}">${summaryPanelHTML}</div>
        <div style="padding:0 32px 32px">
          <div class="result-actions">
            <button class="btn-reset" id="btnReset">${ICONS.reset} Start New Assessment</button>
            <button class="btn-copy${copied?' copied':''}" id="btnCopy">${copied?ICONS.check+' Copied!':ICONS.copy+' Copy'}</button>
          </div>
          <div class="info-banner">${ICONS.info()} <span>If you are completing this as part of the online SFL proposal form, copy the results and paste them into the <strong>"Speed to Market"</strong> section of the form.</span></div>
        </div>
      </div>
    </div>`;
}

// ── Render form ───────────────────────────────────────────────────────────────
function renderForm() {
  const {sec, errors} = state;
  const prog = Math.round((sec/7)*100);
  const s = SECTIONS[sec-1];
  const hasErr = Object.values(errors).some(Boolean);

  return `
    <div class="header">
      <img src="curtin.png" alt="Curtin University" width="320" height="80">
      <h1>Short Form Learning</h1>
      <div class="subtitle">Project Readiness Check</div>
      <button class="info-toggle" id="infoToggle">${ICONS.info('#6366f1')} What is this? <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
      <div class="info-body" id="infoBody">
        <div class="info-body-inner">
          <p>This questionnaire takes approximately 3–5 minutes to complete.</p>
          <p>It is designed to help you evaluate your project's readiness for a Short Form Learning (SFL) build by identifying any gaps that may require attention. It will also provide an estimated project timeline and generate a summary that you can copy and paste into your Short Form Learning EOI.</p>
          <p>You will be asked about the practical elements of your curriculum design, including whether learning outcomes are clearly defined, content is structured, learning activities are identified, and appropriate learning media (e.g., video, scenarios, quizzes, learning guides) have been selected or developed. The questionnaire will also assess how complete these materials are and whether any production, review, or approval steps remain outstanding.</p>
          <p>Note: This is not a formal scoping exercise. It is intended for your internal planning purposes only.</p>
        </div>
      </div>
    </div>
    <div class="progress-card">
      <div class="progress-labels"><span>Step ${sec} of 7</span><span>${prog}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    </div>
    <div class="nav-pills">
      ${SECTIONS.map(s=>`<button class="pill${s.id===sec?' active':''}" data-nav="${s.id}">${s.id}</button>`).join('')}
    </div>
    <div class="form-card${hasErr?' shake':''}" id="formCard">
      <div class="section-header">
        <div class="section-icon">${ICONS[s.icon]}</div>
        <h2>${s.title}</h2>
      </div>
      <div class="section-body">${renderSection(sec)}</div>
      <div class="form-footer">
        <button class="btn-back" id="btnBack" ${sec===1?'disabled':''}>${ICONS.chevronL} Back</button>
        ${sec<7
          ? `<button class="btn-next" id="btnNext">Next ${ICONS.chevronR}</button>`
          : `<button class="btn-calc" id="btnCalc">Calculate Score</button>`}
      </div>
    </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = state.showResults ? renderResults() : renderForm();
  bindEvents();
  // animate score bars after paint
  if(state.showResults) requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.score-bar-fill').forEach(el=>{
      const w=el.style.width; el.style.width='0'; setTimeout(()=>el.style.width=w,50);
    });
  }));
}

// ── Event binding ─────────────────────────────────────────────────────────────
function bindEvents() {
  const fd = state.fd;

  // Info toggle
  const infoToggle = document.getElementById('infoToggle');
  const infoBody = document.getElementById('infoBody');
  if(infoToggle) infoToggle.addEventListener('click', ()=>{
    infoToggle.classList.toggle('open');
    infoBody.classList.toggle('open');
  });

  // Dev tip
  const devtip = document.getElementById('devtip');
  if(devtip) {
    devtip.addEventListener('click', e=>{
      e.stopPropagation();
      devtip.classList.toggle('show');
      const box = devtip.querySelector('.tip-box');
      if(box && devtip.classList.contains('show')){
        const icon = devtip.querySelector('.tip-icon');
        const r = icon.getBoundingClientRect();
        const boxW = 260;
        let left = r.left;
        if(left + boxW > window.innerWidth - 16) left = window.innerWidth - boxW - 16;
        if(left < 16) left = 16;
        box.style.left = left + 'px';
        // position below icon, but flip above if it would overflow bottom
        const spaceBelow = window.innerHeight - r.bottom - 6;
        const boxH = 160; // estimated max height
        if(spaceBelow < boxH){
          box.style.top = Math.max(8, r.top - boxH - 6) + 'px';
        } else {
          box.style.top = (r.bottom + 6) + 'px';
        }
      }
    });
    document.addEventListener('click', ()=>devtip.classList.remove('show'), {once:true});
  }

  // Nav pills
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click', ()=>{
    const target = parseInt(el.dataset.nav);
    const errs = validate(state.sec);
    if(Object.keys(errs).length){ state.errors=errs; render(); shake(); return; }
    state.errors={};
    state.sec=target;
    render();
    window.scrollTo(0,0);
  }));

  // Text inputs
  ['projectName','faculty','launchDate','deliveryDetails','marketingDate'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('input', e=>{
      fd[id]=e.target.value;
      if(state.errors[id]){ state.errors[id]=null; document.querySelector('.val-msg')?.remove(); }
    });
  });

  // Radio options
  document.querySelectorAll('[data-radio]').forEach(el=>el.addEventListener('click', ()=>{
    const field=el.dataset.radio, val=el.dataset.val;
    fd[field]=val;
    if(field==='deliveredBefore' && val==='no') fd.developmentLift='scratch';
    if(field==='marketingDeadline') fd.marketingDate='';
    if(state.errors[field]) state.errors[field]=null;
    render();
  }));

  // Checkbox options
  document.querySelectorAll('[data-check]').forEach(el=>el.addEventListener('click', ()=>{
    if(el.classList.contains('disabled')) return;
    const field=el.dataset.check, val=el.dataset.val;
    if(field==='existingContent'){
      if(val==='nothing'){ fd.existingContent=fd.existingContent.includes('nothing')?[]:['nothing']; }
      else { fd.existingContent=fd.existingContent.includes(val)?fd.existingContent.filter(x=>x!==val):[...fd.existingContent.filter(x=>x!=='nothing'),val]; }
    } else {
      fd[field]=fd[field].includes(val)?fd[field].filter(x=>x!==val):[...fd[field],val];
    }
    render();
  }));

  // Back
  const btnBack = document.getElementById('btnBack');
  if(btnBack) btnBack.addEventListener('click', ()=>{ state.errors={}; state.sec=Math.max(1,state.sec-1); render(); window.scrollTo(0,0); });

  // Next
  const btnNext = document.getElementById('btnNext');
  if(btnNext) btnNext.addEventListener('click', ()=>{
    const errs=validate(state.sec);
    if(Object.keys(errs).length){ state.errors=errs; render(); shake(); return; }
    state.errors={}; state.sec++; render(); window.scrollTo(0,0);
  });

  // Calculate
  const btnCalc = document.getElementById('btnCalc');
  if(btnCalc) btnCalc.addEventListener('click', ()=>{
    const errs=validate(state.sec);
    if(Object.keys(errs).length){ state.errors=errs; render(); shake(); return; }
    state.errors={}; state.score=calcScore(); state.showResults=true; render(); window.scrollTo(0,0);
  });

  // Tabs
  const tabScore=document.getElementById('tabScore'), tabSummary=document.getElementById('tabSummary');
  if(tabScore) tabScore.addEventListener('click',()=>{ state.tab='score'; render(); });
  if(tabSummary) tabSummary.addEventListener('click',()=>{ state.tab='summary'; render(); });

  // Reset
  const btnReset=document.getElementById('btnReset');
  if(btnReset) btnReset.addEventListener('click',()=>{
    state.fd={projectName:'',faculty:'',launchDate:'',existingContent:[],contentStage:'',deliveredBefore:'',deliveryDetails:'',developmentLift:'',productionElements:[],approvals:[],marketingDeadline:'',marketingDate:''};
    state.showResults=false; state.score=null; state.sec=1; state.errors={}; state.copied=false;
    render(); window.scrollTo(0,0);
  });

  // Copy
  const btnCopy=document.getElementById('btnCopy');
  if(btnCopy) btnCopy.addEventListener('click',()=>{
    const t=buildCopyText();
    (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);});
    state.copied=true; render();
    setTimeout(()=>{ state.copied=false; render(); },2000);
  });
}

function shake() {
  const card = document.getElementById('formCard');
  if(!card) return;
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
